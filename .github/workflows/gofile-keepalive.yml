name: GoFile Keep Alive

on:
  schedule:
    - cron: '0 0 */6 * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: gofile-keepalive
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: 1

jobs:
  keepalive:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Restore progress cache
        uses: actions/cache@v4
        id: progress-cache
        with:
          path: gofile-keepalive/.progress
          key: gofile-keepalive-progress-v1

      # Deploy the proxy Worker FIRST — before running keepalive — so that
      # the Worker (GOFILE_PROXY_URL) is live when keepalive tries to use
      # it for token fetching and page visits. Only runs when a Cloudflare
      # API token with Workers permissions is configured.
      - name: Deploy proxy Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: gofile-keepalive
        run: |
          npm install -g wrangler
          wrangler deploy

      - name: Run keepalive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          GOFILE_PROXY_URL: ${{ secrets.GOFILE_PROXY_URL }}
          PROXY_SOURCE: ${{ secrets.PROXY_SOURCE }}
        run: python gofile-keepalive/keepalive.py

  retrigger:
    needs: keepalive
    # Keep the self-sustaining chain alive even if a single run fails
    # (e.g. a transient GoFile 5xx). The cron in `on:` still provides a
    # backstop every 6h if the proxy is down for an extended outage.
    if: success() || failure()
    runs-on: ubuntu-latest
    steps:
      - name: Re-trigger this workflow immediately
        run: gh workflow run gofile-keepalive.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
