name: GoFile Keep Alive

on:
  schedule:
    - cron: '0 0 */6 * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: gofile-keepalive
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: 1

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch codes and process all batches sequentially
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          GOFILE_PROXY_URL: ${{ secrets.GOFILE_PROXY_URL }}
        run: python gofile-keepalive/keepalive.py

  retrigger:
    needs: keepalive
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Re-trigger this workflow immediately
        run: gh workflow run "GoFile Keep Alive" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
