name: Backfill

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: backfill-workflow
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  backfill:
    runs-on: windows-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      COOKIES: ${{ secrets.COOKIES }}
      USER_AGENT: ${{ secrets.USER_AGENT }}
      SEEKSTREAMING_KEY: ${{ secrets.SEEKSTREAMING_KEY }}
      UPNSHARE_KEYS: ${{ secrets.UPNSHARE_KEYS }}
      GITHUB_REPO: lawdachuss/backfill
      GITHUB_BRANCH: master
      GITHUB_PREVIEW_PATH: previews

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: stable

      - name: Run backfill (5h max, 2min delay between recordings)
        run: go run scripts/backfill_media.go -duration 5h -delay 2m -concurrency 1 -trigger-workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
