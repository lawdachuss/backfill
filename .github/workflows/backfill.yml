name: Backfill

on:
  workflow_dispatch:
    inputs:
      shards:
        description: "Number of matrix shards (parallel jobs)"
        required: false
        default: "8"
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: backfill-workflow
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: ${{ fromJson(format('[0,1,2,3]')) }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      COOKIES: ${{ secrets.COOKIES }}
      USER_AGENT: ${{ secrets.USER_AGENT }}
      SEEKSTREAMING_KEY: ${{ secrets.SEEKSTREAMING_KEY }}
      UPNSHARE_KEYS: ${{ secrets.UPNSHARE_KEYS }}
      GITHUB_REPO: lawdachuss/backfill
      GITHUB_BRANCH: master
      GITHUB_PREVIEW_PATH: previews

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: stable

      # Install ffmpeg + yt-dlp for local thumbnail/preview generation
      - name: Install ffmpeg and yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install --quiet yt-dlp
          ffmpeg -version | head -1
          yt-dlp --version

      # Step 1: Try host-manage API backfill (SeekStreaming / UPnShare)
      - name: Run host backfill shard ${{ matrix.shard }}
        continue-on-error: true
        run: go run scripts/backfill_media.go -duration 5h -delay 30s -concurrency 1 -shard ${{ matrix.shard }} -shards 4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Generate thumbnails/previews locally for ALL remaining recordings
      # Downloads via yt-dlp from any host, generates with ffmpeg, uploads to Pixhost
      - name: Run local preview generation shard ${{ matrix.shard }}
        run: go run scripts/generate_previews.go -shard ${{ matrix.shard }} -shards 4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Self-trigger: restart backfill on completion.
      # Only shard 0 dispatches to avoid 4x duplicate runs.
      - name: Re-trigger backfill on completion
        if: success() && matrix.shard == 0
        run: |
          sleep 5
          curl -s -X POST https://api.github.com/repos/lawdachuss/backfill/actions/workflows/backfill.yml/dispatches \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref": "master"}' && echo "✅ Dispatched new backfill run"
